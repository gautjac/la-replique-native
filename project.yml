name: LaReplique
options:
  bundleIdPrefix: app.atelier
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true
  developmentLanguage: fr

# Bilingual FR + EN. fr is the development/fallback language.
knownRegions:
  - fr
  - en
  - Base

# Local Swift package: the atelier's shared toolbox. We link ClaudeKit only.
packages:
  AtelierKit:
    path: ../atelier-kit

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "9WZ66DZ69J"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  LaReplique:
    type: application
    # One multiplatform target → a single universal app, native on iOS
    # (iPhone/iPad) and macOS (AppKit-backed SwiftUI, NOT Catalyst).
    # Module named `LaReplique` — `Replique` alone risks symbol collisions.
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Sources
    dependencies:
      - package: AtelierKit
        product: ClaudeKit
    info:
      path: Sources/Resources/Info.plist
      properties:
        CFBundleDisplayName: La Réplique
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundleLocalizations:
          - fr
          - en
        LSApplicationCategoryType: public.app-category.productivity
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.lareplique
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        # Per-SDK entitlements: macOS carries the App Sandbox + file access; both
        # platforms carry iCloud/CloudKit + network for sync and BYOK Claude calls.
        "CODE_SIGN_ENTITLEMENTS[sdk=macosx*]": Sources/Resources/macOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphoneos*]": Sources/Resources/iOS.entitlements
        "CODE_SIGN_ENTITLEMENTS[sdk=iphonesimulator*]": Sources/Resources/iOS.entitlements
        SUPPORTS_MACCATALYST: NO

  LaRepliqueTests:
    type: bundle.unit-test
    # Pure-logic tests: la-replique/1 JSON import/export round-trip, parser.
    # Multiplatform so they run on the Mac with no simulator boot.
    supportedDestinations: [iOS, macOS]
    deploymentTarget:
      iOS: "17.0"
      macOS: "14.0"
    sources:
      - path: Tests
    dependencies:
      - target: LaReplique
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.lareplique.tests
        GENERATE_INFOPLIST_FILE: YES
        "TEST_HOST[sdk=macosx*]": "$(BUILT_PRODUCTS_DIR)/LaReplique.app/Contents/MacOS/LaReplique"

schemes:
  LaReplique:
    build:
      targets:
        LaReplique: all
        LaRepliqueTests: [test]
    test:
      targets:
        - LaRepliqueTests
